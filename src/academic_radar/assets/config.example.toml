state_dir = "~/.local/share/personal-academic-radar"
profile_file = "research-profile.md"
bootstrap_mode = "baseline"
lookback_days = 14
relevance_threshold = 0.70
feedback_examples_per_class = 20
user_agent = "PersonalAcademicRadar/0.8 (mailto:you@example.com)"

[collection]
rows_per_page = 80
max_pages_per_source = 3
timeout_seconds = 30
max_retries = 3
backoff_seconds = 2.0
openalex_fallback = true

[delivery]
enabled = false
send_when_empty = true
smtp_host = "smtp.gmail.com"
smtp_port = 465
username_env = "PAPER_MONITOR_SMTP_USERNAME"
password_env = "PAPER_MONITOR_SMTP_PASSWORD"
from_address = "you@example.com"
to_addresses = ["you@example.com"]

